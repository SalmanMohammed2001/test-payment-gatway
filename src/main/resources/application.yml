spring:
  application:
    name: cybersource-payment
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:cybersource_payment}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Salman123!}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

server:
  port: ${SERVER_PORT:8080}

# CyberSource REST API (HTTP Signature).
cybersource:
  authentication-type: http_signature
  merchant-id: ${CYBS_MERCHANT_ID:999999000246001}
  merchant-key-id: ${CYBS_MERCHANT_KEY_ID:73c61f35-d97c-4f57-aceb-f4ecac238a96}
  merchant-secret-key: ${CYBS_MERCHANT_SECRET_KEY:/pSueTOLcPeRoU1Unb/GKYqiQcIW6xYGhnbezhWpEMQ=}
  run-environment: ${CYBS_RUN_ENVIRONMENT:apitest.cybersource.com}
  enable-log: ${CYBS_ENABLE_LOG:false}
  default-currency: ${CYBS_DEFAULT_CURRENCY:LKR}
  retry:
    max-attempts: 3
    initial-backoff: 500
    max-backoff: 4000

np

# Secure Acceptance — Hosted Checkout (must match Business Center → Security tab).
secure-acceptance:
  profile-id: ${SA_PROFILE_ID:36111A12-9725-45E8-B895-BA48CF15AA9E}
  access-key: ${SA_ACCESS_KEY:f143c9b5bd8737ceb82861e4be779a04}
  secret-key: ${SA_SECRET_KEY:a3280354ff644207b61b12aa19cee9fc783c41d849734f0fb2043d3f5708758dac342b01f8b04c06b32428ffa677fc18ce52b9f2768c404a85538b8107fe98367d171010d93349608dd0ede3f2293758383f6a91ee094d679ac0337e3ec97f0b9caa4ba313b44d5bbb5b837f3db9f3c5ea44ff0535d04542987a26c594a22107}
